<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker | Home</title>
    <link
      rel="shortcut icon"
      href="./images/github-logo.png"
      type="image/x-icon"
    />
    <!-- loading font-awesome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- loading tailwind and daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- loading font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <header class="w-[520px] my-10 mx-auto bg-white p-8">
      <div class="grid grid-cols-1 justify-items-center py-6">
        <img class="mb-5" src="./images/github-logo.png" alt="github_logo" />
        <h1 class="font-semibold text-[24px]">GitHub Issues Tracker</h1>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
      </div>
      <div>
        <form>
          <div class="space-y-2 py-6">
            <label for="input-username">Username</label><br />
            <input
              id="input-username"
              class="w-full p-3 border-[#ddd] rounded-lg"
              type="text"
              placeholder="Enter Username"
            />
            <p class="text-[#4A00FF] text-[14px]">Default: admin</p>
            <label for="input-password">Password</label><br />
            <input
              id="input-password"
              class="w-full p-3 border-[#ddd] rounded-lg"
              type="password"
              placeholder="Enter Password"
            />
            <p class="text-[#4A00FF] text-[14px]">Default: admin123</p>
          </div>
        </form>
        <button id="btn-login" class="btn btn-primary w-full py-6">
          Sign In
        </button>
        <div class="flex items-center my-6">
          <hr class="flex-grow border-gray-300" />
          <span class="mx-4 text-gray-500">OR</span>
          <hr class="flex-grow border-gray-300" />
        </div>
        <p class="text-gray-500 text-[14px] text-center">Demo Credentials:</p>
        <div class="bg-[#F8FAFC] p-6 text-center mt-2 rounded-lg">
          <p><span class="font-semibold">Username: </span>admin</p>
          <p><span class="font-semibold">Password: </span>admin123</p>
        </div>
      </div>
    </header>

    <script src="./scripts/script.js"></script>
  </body>
</html>
